name: App Platform Artifact

on:
  pull_request:
  push:
    branches:
      - wip
      - rc
      - main
      - master
    tags:
      - 'tailorkit-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-artifact:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate CI contract
        run: npm run ci:contract

      - name: Build app-platform artifact
        run: npm run build:artifact

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ss-pf-app-tailorkit-artifact
          path: |
            dist/artifacts/*.tgz
            dist/artifacts/*.tgz.sha256
            dist/artifacts/*.tgz.release.json
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/tailorkit-v')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            dist/artifacts/*.tgz \
            dist/artifacts/*.tgz.sha256 \
            dist/artifacts/*.tgz.release.json \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG_NAME" \
            --verify-tag

      - name: Notify artifact failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.APP_PLATFORM_ARTIFACT_SLACK_WEBHOOK }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "APP_PLATFORM_ARTIFACT_SLACK_WEBHOOK is not configured; skipping Slack notification."
            exit 0
          fi

          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"TailorKit app-platform artifact workflow failed: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}" \
            "$SLACK_WEBHOOK_URL"
